<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--css links-->
    <link rel="stylesheet" href="main.css" />

    <title>My Music Player</title>
  </head>
  <body class="center flex-c">
    <div class="srch"></div>
    <div class="boxes-container flex-r">
        <!--playlist canciones y demas-->
      <section class="music-box flex-c">
        <div class="playlists">
            <h2>Playlists</h2>
            <input type="text" placeholder="Buscar playlist" />
        </div>
        <div class="songs">
            <h2>Canciones</h2>
            <input type="text" placeholder="Buscar cancion" />
        </div>
      </section>
      <!--apartado de la caja de controles-->
      <section class="controls-box flex-c center">
        <input type="range" id="song-time">
      </section>

    </div>
    <script src="main.js"></script>
  </body>
</html>
