<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" href="assets/icons/favicon.png" type="image/png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--css links-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/player-box.css" />
    <link rel="stylesheet" href="css/music-box.css" />

    <title>DaJo Player</title>
  </head>
  <body>
    <h1>DaJo Player</h1>
    <div class="boxes-container flex-r">
      <section class="music-box">
        <div class="songs flex-c">
          <h2>Canciones</h2>
          <input
            type="text"
            placeholder="Buscar cancion"
            id="buscador-canciones"
          />
          <div id="display-songs"></div>
        </div>
      </section>

      <!--apartado de la caja de controles-->

      <section class="player-box flex-c" id="player-box">
        <img class="default-cover" id="cover" src="assets/icons/favicon.png">
        <h2 id="title"></h2>
        <span id="artist"></span>
        <input type="range" id="song-time" value="0" />
        <div class="controls flex-r center">
          <i class="fa-solid fa-shuffle"></i> 
          <i class="fa-solid fa-backward-step"></i> 
          <i class="fa-solid fa-play" id="pp"></i>
          <i class="fa-solid fa-forward-step"></i>
          <i class="fa-solid fa-volume-high"></i>
        </div>
      </section>
    </div>
    <footer>
      <p>
        Code By Dalmar Campaz - David vidal &copy
      </p>
    </footer>
    <script src="js/player.js"></script>
    <script src="js/songs.js"></script>
  </body>
</html>
